<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feedback Modal</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Button */
    .demo-btn {
      padding: 16px 36px;
      border-radius: 50px;
      border: none;
      background: linear-gradient(135deg, #f59e0b, #f97316);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    /* Overlay */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: 0.3s ease;
      z-index: 999;
    }

    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    /* Modal */
    .feedback-modal {
      background: #fff;
      width: 100%;
      max-width: 500px;
      border-radius: 24px;
      padding: 40px;
      position: relative;
      transform: scale(0.9) translateY(20px);
      transition: 0.4s ease;
    }

    .modal-overlay.active .feedback-modal {
      transform: scale(1) translateY(0);
    }

    /* Close */
    .close-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: #f1f5f9;
      font-size: 18px;
      cursor: pointer;
    }

    /* Header */
    .modal-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .modal-header h2 {
      font-size: 26px;
      font-weight: 800;
      color: #1e293b;
    }

    .modal-header p {
      color: #64748b;
      margin-top: 6px;
    }

    /* Rating */
    .emoji-ratings {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
    }

    .emoji-option {
      flex: 1;
      text-align: center;
      padding: 18px 10px;
      border-radius: 16px;
      border: 2px solid #e2e8f0;
      cursor: pointer;
      transition: 0.3s ease;
    }

    .emoji-option:hover {
      transform: translateY(-4px);
    }

    .emoji-option.selected {
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-color: transparent;
      color: #fff;
    }

    .emoji {
      font-size: 36px;
      display: block;
      margin-bottom: 6px;
    }

    .emoji-text {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }

    /* Submit */
    .submit-btn {
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .submit-btn:disabled {
      background: #cbd5e1;
      cursor: not-allowed;
    }

    /* Success */
    .success-message {
      display: none;
      text-align: center;
    }

    .success-message.active {
      display: block;
    }

    .success-message h3 {
      color: #16a34a;
      font-size: 24px;
      margin-top: 12px;
    }
  </style>
</head>

<body>

  <button class="demo-btn" id="openBtn">Give Feedback</button>

  <div class="modal-overlay" id="modal">
    <div class="feedback-modal">

      <button class="close-btn" id="closeBtn">✕</button>

      <div id="form">
        <div class="modal-header">
          <h2>Rate Your Experience</h2>
          <p>How was your food today?</p>
        </div>

        <div class="emoji-ratings">
          <div class="emoji-option" data-rate="1">😞<div class="emoji-text">Poor</div></div>
          <div class="emoji-option" data-rate="2">😐<div class="emoji-text">Fair</div></div>
          <div class="emoji-option" data-rate="3">🙂<div class="emoji-text">Good</div></div>
          <div class="emoji-option" data-rate="4">😊<div class="emoji-text">Great</div></div>
          <div class="emoji-option" data-rate="5">😍<div class="emoji-text">Excellent</div></div>
        </div>

        <button class="submit-btn" id="submitBtn" disabled>Submit Feedback</button>
      </div>

      <div class="success-message" id="success">
        <div style="font-size:64px;">🎉</div>
        <h3>Thank You!</h3>
        <p>Your feedback was submitted.</p>
      </div>

    </div>
  </div>

  <script>
    const modal = document.getElementById("modal");
    const openBtn = document.getElementById("openBtn");
    const closeBtn = document.getElementById("closeBtn");
    const options = document.querySelectorAll(".emoji-option");
    const submitBtn = document.getElementById("submitBtn");
    const form = document.getElementById("form");
    const success = document.getElementById("success");

    let rating = null;

    openBtn.onclick = () => modal.classList.add("active");
    closeBtn.onclick = closeModal;

    modal.onclick = e => {
      if (e.target === modal) closeModal();
    };

    options.forEach(opt => {
      opt.onclick = () => {
        options.forEach(o => o.classList.remove("selected"));
        opt.classList.add("selected");
        rating = opt.dataset.rate;
        submitBtn.disabled = false;
      };
    });

    submitBtn.onclick = () => {
      console.log("Rating:", rating);
      form.style.display = "none";
      success.classList.add("active");
      setTimeout(closeModal, 2000);
    };

    function closeModal() {
      modal.classList.remove("active");
      setTimeout(() => {
        rating = null;
        options.forEach(o => o.classList.remove("selected"));
        submitBtn.disabled = true;
        form.style.display = "block";
        success.classList.remove("active");
      }, 300);
    }
  </script>

</body>
</html>
