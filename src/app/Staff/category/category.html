<br><br><br><section class="food-area section-padding">
  <div class="container">
    <div class="row">

      @for (data of categoryarray; track data) {
        <div class="col-lg-4 col-md-6 mb-4">
          <div class="single-food">

            <div class="food-img">
              <img
                src="http://localhost:3000/images/{{ data.category_image }}"
                alt="{{ data.category_name }}"
              >
            </div>

            <div class="food-content">
              <div class="d-flex justify-content-between align-items-center">
                <h5>{{ data.category_name }}</h5>
              
              </div>

              <p>{{ data.description }}</p>

              <!-- BOOK NOW BUTTON -->
              <a
                class="book-btn"
                [routerLink]="['/staffmaster/viewsingle', data.category_id]"
              >
        SHOW MORE
              </a>

            </div>

          </div>
        </div>
      }

    </div>
  </div>
</section>
