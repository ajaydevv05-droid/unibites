<div class="container" style="margin-top: 80px;">
    <div class="page-inner">
        <div class="page-header">
            <h3 class="fw-bold mb-3">Category Registration</h3>
            <ul class="breadcrumbs mb-3">
                <li class="nav-home">
                    <a href="#">
                        <i class="icon-home"></i>
                    </a>
                </li>
                <li class="separator">
                    <i class="icon-arrow-right"></i>
                </li>
                <li class="nav-item">
                    <a href="#">Forms</a>
                </li>
                <li class="separator">
                    <i class="icon-arrow-right"></i>
                </li>
                <li class="nav-item">
                    <a href="#">Category Registration</a>
                </li>
            </ul>
        </div>

        <div class="row">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">Category Registration Form</div>
                    </div>

                    <div class="card-body">
                        <div class="row">
                          <form class="login-form" [formGroup]="cateditformgroup" enctype="multipart/form-data">

                                <div class="col-md-6 col-lg-12">

                                    <div class="form-group">
                                        <label for="categoryName">Category Name</label>
                                        <input type="text" class="form-control" id="categoryName"
                                            placeholder="Enter category name" formControlName="categoryName" required/>
                                            <label *ngIf="cateditformgroup.controls['categoryName'].errors['required']&&savestatus"class="text-danger">*</label>
                                    </div>

                                    <div class="form-group">
                                        <label for="categoryImage">Category Image</label>
                                        <input type="file" class="form-control-file" id="categoryImage" formControlName="categoryImage" 
                                        (change)="selectedFile($event)"required/>
                                        <label *ngIf="cateditformgroup.controls['categoryImage'].errors['required']&&savestatus"class="text-danger">*</label>
                                    </div>
                                    <div class="form-group text-center mb-4">
                                        <img src="http://localhost:3000/images/{{categoryarray[0].category_image}}" alt="category preview" width="100" height="50" class="img-thumbnail"/>
                                    </div>

                                    <div class="form-group">
                                        <label for="description">Description</label>
                                        <textarea class="form-control" id="description" rows="5"
                                            placeholder="Enter category description" formControlName="description" required>
                                        <label *ngIf="cateditformgroup.controls['categoryName'].errors['required']&&savestatus"class="text-danger">*</label></textarea>
                                    </div>

                                </div>

                                <div class="card-action">
                                    <button class="btn btn-success" (click)="onsubmit()">Submit</button>
                                    <button class="btn btn-danger">Cancel</button>
                                </div>

                            </form>
                        </div>
                    </div>

                </div>
            </div>
        </div>

    </div>
</div>
